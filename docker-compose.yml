services:

  # -------------------------------------------------
  # PostgreSQL (CommerceFlow + Airflow Metadata)
  # -------------------------------------------------
  postgres:
    image: postgres:16
    container_name: commerceflow-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: commerce_flow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/schema:/docker-entrypoint-initdb.d/schema
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d commerce_flow"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -------------------------------------------------
  # Airflow Initialization
  # -------------------------------------------------
  airflow-init:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile

    container_name: airflow-init

    depends_on:
      postgres:
        condition: service_healthy

    env_file:
      - .env

    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:postgres@postgres/airflow
      PYTHONPATH: /opt/airflow/project

      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: commerce_flow
      DB_USER: postgres
      DB_PASSWORD: postgres

    command: >
      bash -c "
      airflow db migrate &&
      airflow users create
      --username admin
      --firstname Admin
      --lastname User
      --role Admin
      --email admin@example.com
      --password admin
      "

    volumes:
      - ./:/opt/airflow/project
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins

  # -------------------------------------------------
  # Airflow Scheduler
  # -------------------------------------------------
  airflow-scheduler:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile

    container_name: airflow-scheduler

    restart: unless-stopped

    depends_on:
      airflow-init:
        condition: service_completed_successfully

    env_file:
      - .env

    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:postgres@postgres/airflow
      PYTHONPATH: /opt/airflow/project

      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: commerce_flow
      DB_USER: postgres
      DB_PASSWORD: postgres

    command: scheduler

    volumes:
      - ./:/opt/airflow/project
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins

  # -------------------------------------------------
  # Airflow Webserver
  # -------------------------------------------------
  airflow-webserver:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile

    container_name: airflow-webserver

    restart: unless-stopped

    depends_on:
      airflow-init:
        condition: service_completed_successfully

    env_file:
      - .env

    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:postgres@postgres/airflow
      PYTHONPATH: /opt/airflow/project

      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: commerce_flow
      DB_USER: postgres
      DB_PASSWORD: postgres

    command: webserver

    ports:
      - "8080:8080"

    volumes:
      - ./:/opt/airflow/project
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins

volumes:
  postgres_data: